<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --black:#111111;
  --cream:#F6F4EF;
  --c1:#7f77dd;
  --c2:#d4537e;
  --c3:#1d9e75;
  --c4:#ef9f27;
  --mid:#666560;
  --light:#999999;
}
html,body{height:100%;}
body{
  background:var(--black);
  font-family:'Inter',sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:40px 24px;
}

/* ── LOGO SVG ── */
.logo-wrap{margin-bottom:24px;}
.logo-wrap svg{width:72px;height:72px;}

/* ── WORDMARK ── */
.wordmark{text-align:center;margin-bottom:8px;}
.wordmark h1{
  font-family:'Cormorant Garamond',serif;
  font-size:38px;
  font-weight:700;
  letter-spacing:0.14em;
  color:var(--cream);
  line-height:1;
}
.wordmark span{
  font-family:'Inter',sans-serif;
  font-size:10px;
  letter-spacing:0.4em;
  text-transform:uppercase;
  color:var(--light);
  display:block;
  margin-top:6px;
}

/* ── TAGLINE ── */
.tagline{
  font-family:'Cormorant Garamond',serif;
  font-size:14px;
  font-style:italic;
  color:var(--light);
  text-align:center;
  margin-bottom:36px;
  letter-spacing:0.04em;
}

/* ── SEPARADOR ── */
.sep{
  display:flex;
  width:48px;
  height:2px;
  margin:0 auto 36px;
  overflow:hidden;
}
.sep span{flex:1;}
.sep span:nth-child(1){background:var(--c1);}
.sep span:nth-child(2){background:var(--c3);}
.sep span:nth-child(3){background:var(--c4);}
.sep span:nth-child(4){background:var(--c2);}

/* ── LINKS ── */
.links{width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px;margin-bottom:40px;}

.link-btn{
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px 20px;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:2px;
  text-decoration:none;
  color:var(--cream);
  font-size:13px;
  font-weight:400;
  letter-spacing:0.04em;
  transition:background 0.2s, border-color 0.2s;
  background:rgba(255,255,255,0.03);
}
.link-btn:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.15);}
.link-btn .icon{width:18px;height:18px;flex-shrink:0;opacity:0.7;}
.link-btn .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-left:auto;}

/* ── CONTACTO ── */
.contact{text-align:center;}
.contact a{
  font-size:11px;
  color:var(--light);
  text-decoration:none;
  letter-spacing:0.06em;
}
.contact a:hover{color:var(--cream);}

/* ── FOOTER ── */
.footer{
  margin-top:auto;
  padding-top:40px;
  font-size:10px;
  color:rgba(255,255,255,0.15);
  letter-spacing:0.06em;
  text-align:center;
}
</style>
</head>
